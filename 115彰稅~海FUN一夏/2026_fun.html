<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026彰稅~海FUN一夏活動</title>
    <style>
        /* ================= 基礎設定與字體 ================= */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%); /* 預設水系漸層背景 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto; /* 允許手機版在內容較多時正常上下滾動 */
            padding: 20px 10px;
            position: relative;
        }

        /* ================= 遊戲主容器 ================= */
        .game-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2), inset 0 0 0 8px rgba(255, 255, 255, 0.5);
            padding: 30px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            border: 4px solid #fff;
            margin: auto;
        }

        /* 隱藏區塊 */
        .hidden { display: none !important; }

        /* ================= 圖片/圖文佔位區塊 ================= */
        .image-placeholder {
            width: 100%;
            height: 160px;
            background: #e0f7fa;
            border: 3px dashed #26c6da;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            color: #00838f;
            font-weight: 700;
            font-size: 1.1rem;
            overflow: hidden;
            position: relative;
        }
        .image-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ================= 排版與文字 ================= */
        h1 { color: #0277bd; font-size: 2.2rem; margin-bottom: 10px; text-shadow: 2px 2px 0px #e1f5fe; line-height: 1.3; }
        h2 { color: #ff9800; font-size: 1.6rem; margin-bottom: 15px; }
        p { color: #455a64; font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; }
        
        .emoji-icon { font-size: 4rem; margin-bottom: 10px; animation: bounce 2s infinite; display: inline-block; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* ================= 按鈕設計 ================= */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 0px rgba(0,0,0,0.15);
        }
        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0px rgba(0,0,0,0.15);
        }
        
        .btn-primary { background: #ff9800; color: white; } /* 橘色主題鈕 */
        .btn-primary:hover { background: #fb8c00; }
        
        .btn-option { background: #29b6f6; color: white; border: 2px solid #039be5; } /* 水藍色選項 */
        .btn-option:hover { background: #03a9f4; }

        .btn-admin { background: #4caf50; color: white; } /* 綠色工作人員鈕 */

        /* ================= 進度條 ================= */
        .progress-bar-container {
            width: 100%;
            height: 15px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #ffeb3b;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* ================= 輸入框 ================= */
        input[type="number"], input[type="password"], input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 3px solid #b3e5fc;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }
        input:focus { border-color: #29b6f6; }

    </style>
</head>
<body>

    <div class="game-container">
        
        <!-- ================= 1. 遊戲首頁 ================= -->
        <div id="screen-start">
            <div class="emoji-icon">☀️🌊☁️</div>
            <h1>2026彰稅~<br>海FUN一夏活動</h1>
            
            <!-- 圖片佔位區：放入主視覺圖 -->
            <div class="image-placeholder" style="border: none; background: transparent; height: auto; aspect-ratio: 1672 / 941;">
                <img src="水上樂園首頁.jpg" alt="2026彰稅~海FUN一夏活動主視覺" onerror="this.onerror=null; this.src='https://placehold.co/1672x941/e0f7fa/00838f?text=水上樂園首頁圖檔';">
            </div>

            <p style="font-size: 1.4rem; color: #0277bd; font-weight: bold; line-height: 1.6;">通過 4 道稅務關卡<br>學習稅務知識<br>領取宣導品吧！</p>
            <button class="btn btn-primary" onclick="startGame()">開始挑戰</button>
        </div>

        <!-- ================= 2. 遊戲答題區 ================= -->
        <div id="screen-game" class="hidden">
            <!-- 進度條 -->
            <div class="progress-bar-container">
                <div class="progress-bar" id="game-progress"></div>
            </div>

            <div class="emoji-icon" id="q-emoji">🏄‍♂️</div>
            <h2 id="q-title">關卡標題</h2>

            <!-- 關卡圖片顯示區 -->
            <div class="image-placeholder" style="height: auto; aspect-ratio: 16/9; background: transparent; border: none; padding: 0;">
                <img id="q-image" src="" alt="關卡圖片" style="border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);" onerror="this.onerror=null; this.src='https://placehold.co/800x450/e0f7fa/00838f?text=關卡圖片';">
            </div>

            <p id="q-text" style="font-size: 1.25rem; font-weight: bold; color: #01579b;">題目內容</p>
            
            <div id="options-container">
                <!-- 選項按鈕由 JS 動態生成 -->
            </div>
        </div>

        <!-- ================= 3. 遊戲結束 / 兌換區 ================= -->
        <div id="screen-end" class="hidden">
            <div class="emoji-icon">🏆🎁🎉</div>
            <h1>闖關大成功！</h1>

            <p style="font-size: 1.4rem; font-weight: bold; color: #d84315;">請至稅務局攤位兌換獎品</p>
            
            <input type="number" id="passcode" placeholder="工作人員專用密碼" pattern="[0-9]*">
            <button class="btn btn-admin" onclick="checkPass()">✅ 確認兌換</button>
            <button class="btn btn-option" onclick="location.reload()" style="margin-top: 10px; background:#90a4ae; border-color:#78909c;">重新開始</button>
        </div>

    </div>

    <script>
        // ================= 題庫設定 (對應您的4個關卡) =================
        const questions = [
            {
                emoji: "🏄‍♂️",
                title: "第 1 關：SUP 立槳板",
                image: "q1.jpg", 
                text: "小美爸爸領有身心障礙手冊，因為名下没有車，日常生活也都由小美接送，小美名下汽車可以申請使用牌照稅免稅嗎？",
                options: ["可以，小美必須和爸爸同戶籍", "可以，小美的車籍地址必須和爸爸戶籍地址相同", "以上皆可"],
                answerIndex: 2
            },
            {
                emoji: "🛶",
                title: "第 2 關：雙人獨木舟",
                image: "q2.jpg", 
                text: "稅務局提醒大家地價稅自用住宅用地優惠稅率（2‰）與一般稅率相差高達 5倍！錯過這天，今年的節稅風景就只能變明年了。請問這個絕對不能忘記的「地價稅黃金限期截止日」是哪一天呢？",
                options: [" 9 月 22 日", "中秋節當天", " 11 月 30 日"],
                answerIndex: 0
            },
            {
                emoji: "🐉🚣‍♂️",
                title: "第 3 關：龍舟板競技",
                image: "q3.jpg", 
                text: "財政部統一發票兌獎APP 的神仙功能。只要在 APP 裡設定好，不管是在家睡覺、還是在外用餐，發票中獎時獎金都會自動轉入你的帳戶，連千分之四的印花稅都省下來！請問這是什麼功能？",
                options: ["發票變身成現金的「財富自由咒語」", "綁定隨身載具與設定「中獎獎金自動匯款帳戶」", "有拜有保庇"],
                answerIndex: 1
            },
            {
                emoji: "🚴‍♂️💦",
                title: "第 4 關：水上自行車",
                image: "q4.jpg", 
                text: "「手機條碼儲存雲端發票」有超多好處。請問下列哪一個是使用雲端發票的優點？",
                options: ["環保愛地球，少砍幾棵樹，綠意留給山林", "就算不小心把手機摔壞，發票一樣好好地存在雲端不會不見", "以上皆是"],
                answerIndex: 2
            }
        ];

        let currentQuestionIndex = 0;

        // ================= 遊戲邏輯 =================
        function switchScreen(screenId) {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-end').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        function startGame() {
            currentQuestionIndex = 0;
            switchScreen('screen-game');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('q-emoji').innerText = q.emoji;
            document.getElementById('q-title').innerText = q.title;
            document.getElementById('q-text').innerText = q.text;
            
            // 更新關卡圖片
            document.getElementById('q-image').src = q.image;
            
            // 更新進度條
            const progress = ((currentQuestionIndex) / questions.length) * 100;
            document.getElementById('game-progress').style.width = progress + '%';

            // 生成選項按鈕
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; // 清空舊選項
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-option';
                btn.innerHTML = opt; // 支援 HTML 標籤（如 <br>）
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex) {
            const correctIndex = questions[currentQuestionIndex].answerIndex;
            
            if (selectedIndex === correctIndex) {
                alert('✨ 答對了！太厲害啦！準備進入下一關 💦');
                currentQuestionIndex++;
                
                if (currentQuestionIndex < questions.length) {
                    renderQuestion();
                } else {
                    document.getElementById('game-progress').style.width = '100%';
                    setTimeout(() => {
                        switchScreen('screen-end');
                    }, 500);
                }
            } else {
                alert('Oops！不對喔，再試一次看看！💡');
            }
        }

        function checkPass() {
            const passInput = document.getElementById('passcode').value;
            if (passInput === '123') {
                alert('🎉 兌換成功！謝謝您參與稅務大冒險，祝您玩得愉快！');
                
                // --- 傳送通關紀錄至 Google Apps Script ---
                const scriptURL = 'https://script.google.com/macros/s/AKfycby4-eEo001TMzG0e9DkqzboSVQD4R1pTZgygtvsXwFRCvflEGo0pFuhjnoh3f7gEtDY/exec';
                
                const timeString = encodeURIComponent(new Date().toLocaleString('zh-TW'));
                fetch(scriptURL + "?time=" + timeString, { mode: 'no-cors' })
                    .then(() => {
                        document.getElementById('passcode').value = '';
                        location.reload(); // 兌換完後自動重置遊戲
                    })
                    .catch(err => {
                        console.error('連線紀錄失敗:', err);
                        document.getElementById('passcode').value = '';
                        location.reload();
                    });
                // ------------------------------------------
            } else {
                alert('❌ 通行碼錯誤！請確認您是現場工作人員。');
                document.getElementById('passcode').value = '';
            }
        }
    </script>
</body>
</html>
